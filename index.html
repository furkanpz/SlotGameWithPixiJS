<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no, viewport-fit=cover">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="manifest" href="%BASE_URL%manifest.webmanifest">
  <link rel="icon" href="%BASE_URL%assets/logo.png">
  <meta name="apple-mobile-web-app-title" content="Lair of Riches">
  <link rel="apple-touch-icon" href="%BASE_URL%assets/logo.png">
  <title>Lair of Riches</title>
	<style>
		* { -webkit-tap-highlight-color: transparent; }
		html, body {
			margin: 0;
			padding: 0;
			width: 100%;
			height: 100%;
			min-height: 100%;
			background: #000;
			overflow: hidden;
			user-select: none;
			-webkit-user-select: none;
			-ms-user-select: none;
			-webkit-touch-callout: none;
			touch-action: none;
		}

		#app-container {
			position: fixed;
			inset: 0;
			width: 100vw;

			height: 100vh;
			height: -webkit-fill-available;
			height: 100dvh;

			height: calc(var(--vvh, 1vh) * 100);
			padding-bottom: env(safe-area-inset-bottom);
			box-sizing: border-box;
			display: flex;
			justify-content: center;
			align-items: center;
			background: #000;
			user-select: none;
			-webkit-user-select: none;
			-ms-user-select: none;
			-webkit-touch-callout: none;
			touch-action: none;
		}
		#app {
			position: relative;
			background: #000;
		}
		#app canvas {
			display: block;
			user-select: none !important;
			-webkit-user-select: none !important;
			-ms-user-select: none !important;
			-webkit-touch-callout: none !important;
			touch-action: none !important;
		}
	</style>
  <script type="module" src="./src/newMain.ts"></script>
</head>
<body>
<div id="app-container">
	<div id="app"></div>
</div>
</body>
</html>
